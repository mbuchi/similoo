<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="meta.title">similoo — Comparable Buildings Explorer</title>
    <meta name="description" content="Type a Swiss address; similoo shows the building as an LOD 2.5 cube and ranks comparable buildings in the same zone — with a 3D LAS popup for detailed inspection." data-i18n-attr="content:meta.description" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="similoo" />
    <meta property="og:title" content="similoo — comparable buildings explorer" data-i18n-attr="content:meta.og_title" />
    <meta property="og:description" content="Type a Swiss address; similoo shows the building as an LOD 2.5 cube and ranks comparable buildings in the same zone." data-i18n-attr="content:meta.og_description" />
    <meta property="og:url" content="https://similoo.vercel.app/" />
    <meta property="og:image" content="https://toolbox.swissnovo.com/meta/similoo.jpg" />
    <meta property="og:image:secure_url" content="https://toolbox.swissnovo.com/meta/similoo.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1427" />
    <meta property="og:image:height" content="1152" />
    <meta property="og:image:alt" content="similoo — comparable buildings explorer" data-i18n-attr="content:meta.og_image_alt" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="similoo — comparable buildings explorer" data-i18n-attr="content:meta.twitter_title" />
    <meta name="twitter:description" content="Find buildings comparable to your parcel across Switzerland." data-i18n-attr="content:meta.twitter_description" />
    <meta name="twitter:image" content="https://toolbox.swissnovo.com/meta/similoo.jpg" />
    <meta name="twitter:image:alt" content="similoo — comparable buildings explorer" data-i18n-attr="content:meta.twitter_image_alt" />
    <link rel="icon" type="image/svg+xml" href="https://swissnovo-toolbox.vercel.app/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="https://swissnovo-toolbox.vercel.app/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://swissnovo-toolbox.vercel.app/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://swissnovo-toolbox.vercel.app/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://swissnovo-toolbox.vercel.app/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="https://swissnovo-toolbox.vercel.app/favicon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://swissnovo-toolbox.vercel.app/apple-touch-icon.png" />
    <link rel="manifest" href="https://swissnovo-toolbox.vercel.app/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <script>
        // Inline pre-paint theme bootstrap. Runs before any stylesheet is
        // applied so users on dark mode don't see a white flash on load.
        (function () {
            try {
                var stored = localStorage.getItem('similoo-theme');
                var resolved = stored === 'light' || stored === 'dark'
                    ? stored
                    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark'
                        : 'light');
                document.documentElement.setAttribute('data-theme', resolved);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
        // Inline pre-paint locale bootstrap. Sets <html lang> from persisted
        // choice (or navigator) before first paint.
        (function () {
            var supported = ['en', 'fr', 'de', 'it'];
            try {
                var stored = localStorage.getItem('similoo:locale');
                if (stored && supported.indexOf(stored) !== -1) {
                    document.documentElement.lang = stored;
                    return;
                }
                var nav = (navigator.language || '').slice(0, 2).toLowerCase();
                if (supported.indexOf(nav) !== -1) {
                    document.documentElement.lang = nav;
                    return;
                }
            } catch (e) {
                /* ignore */
            }
            document.documentElement.lang = 'en';
        })();
    </script>
    <!-- Typography: Inter (UI, headings — modern tech-sans) + JetBrains Mono (code/IDs); -->
    <!-- Varela Round is kept for the SwissNovo wordmark only, per suite branding. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/landing.css">
    <link rel="stylesheet" href="/src/css/sidebar.css">
    <link rel="stylesheet" href="/src/css/comparison.css">
    <link rel="stylesheet" href="/src/css/map.css">
    <link rel="stylesheet" href="/src/css/buildingDetailModal.css">
</head>
<body>
<div class="navbar">
    <div class="navbar-desktop">
      <div class="navbar-brand">
        <a href="/" class="logo">
            <span class="logo-first">simil</span><span class="logo-second">oo</span>
        </a>
        <span class="logo-subtitle" data-i18n="nav.logo_subtitle">Comparable Buildings</span>
      </div>
      <div class="navbar-actions">
        <button id="themeToggleButton" class="theme-toggle-button" title="Toggle dark mode" aria-label="Toggle dark mode" aria-pressed="false">
            <svg class="theme-toggle-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
            </svg>
            <svg class="theme-toggle-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <select id="locale-select" class="locale-select" aria-label="Select language"
                data-i18n-attr="aria-label:nav.select_language,title:nav.select_language" title="Select language">
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="de">DE</option>
            <option value="it">IT</option>
        </select>
        <div id="authNav" class="auth-nav" aria-live="polite"></div>
      </div>
    </div>
</div>

<!-- Landing: address search (shown first; hidden once an address is picked) -->
<section id="landingView" class="landing-view">
    <div class="landing-card">
        <h1 class="landing-title" data-i18n="landing.title">Type a Swiss address.</h1>
        <p class="landing-subtitle" data-i18n="landing.subtitle">similoo finds buildings comparable to the one at this address — same zone, recent construction — and shows them as LOD 2.5 cubes on the map plus a detailed 3D inspection on demand.</p>
        <form class="landing-search" id="landingSearchForm" role="search" autocomplete="off">
            <input type="search" id="landingSearchInput" class="landing-search-input"
                   placeholder="e.g. Bahnhofstrasse 10, Zürich"
                   aria-label="Search address"
                   data-i18n-attr="placeholder:landing.search_placeholder,aria-label:landing.search_aria" />
            <ul class="landing-results" id="landingResults" role="listbox" hidden></ul>
            <p class="landing-hint" data-i18n="landing.hint">Pick a result to load the comparison.</p>
        </form>
    </div>
</section>

<!-- Comparison surface: split-screen map + sidebar (shown after address pick) -->
<section id="comparisonView" class="comparison-view" hidden>
    <div id="comparisonHeader" class="comparison-header">
        <button id="backToSearch" class="comparison-back" type="button" aria-label="Back to search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span data-i18n="comparison.back">Search again</span>
        </button>
        <div class="comparison-address" id="comparisonAddress"></div>
    </div>
    <div id="mapContainer" class="comparison-map"></div>
</section>

<script type="module" src="/src/js/main.js"></script>
</body>
</html>
